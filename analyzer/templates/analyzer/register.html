{% extends 'analyzer/base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5"><div class="card p-5">
    <h2 class="text-center mb-4">📝 Регистрация</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Имя пользователя</label><input type="text" name="username" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Пароль</label><input type="password" name="password1" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Подтверждение пароля</label><input type="password" name="password2" class="form-control" required></div>
        <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
    </form>
    <hr><p class="text-center"><a href="{% url 'login' %}">Войти</a></p>
</div></div></div>
{% endblock %}
